server:
  port: 9090

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        # anything starting with /accounts goes to account-service
        - id: account-service
          uri: lb://account-service
          predicates:
            - Path=/accounts/**
        # anything starting with /loans goes to loan-service
        - id: loan-service
          uri: lb://loan-service
          predicates:
            - Path=/loans/**

# find the services through Eureka (lb:// uses these registrations)
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
